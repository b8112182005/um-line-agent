<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>瑀墨 — 客戶管理</title>
<style>
  :root{ --navy:#2B5C8A; --gold:#C8A45C; }
  *{ box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
  body{ font-family:"Microsoft JhengHei","PingFang TC","Apple Color Emoji","Segoe UI Emoji","Noto Color Emoji",sans-serif; background:#f4f6f9; color:#222; padding-bottom:24px; }
  header{ background:var(--navy); color:#fff; padding:14px 16px; position:sticky; top:0; z-index:20; }
  header h1{ font-size:18px; }
  .toolbar{ position:sticky; top:52px; z-index:15; background:#f4f6f9; padding:10px 16px 6px; }
  .search input{ width:100%; padding:12px 14px; border:1px solid #ccd3db; border-radius:10px; font-size:16px; }
  .tabs{ display:flex; gap:8px; margin-top:10px; }
  .tab{ flex:1; text-align:center; padding:10px; border:1px solid #ccd3db; border-radius:10px; background:#fff; font-size:15px; color:#555; }
  .tab.on{ background:var(--navy); color:#fff; border-color:var(--navy); font-weight:600; }
  .wrap{ padding:8px 16px 16px; }
  .item{ background:#fff; border:1px solid #e3e8ee; border-radius:10px; padding:12px 14px; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center; gap:10px; }
  .item .nm{ font-size:16px; font-weight:600; word-break:break-word; }
  .item .tag{ display:inline-block; font-size:11px; border-radius:4px; padding:1px 7px; margin-top:5px; }
  .tag.vip{ color:#8a6d2b; background:#fff3d6; }
  .tag.reg{ color:#666; background:#eef1f4; }
  .item .note{ font-size:12px; color:#666; margin-top:5px; word-break:break-word; }
  .item .note.nonote{ color:#c2c8d0; }
  .btns{ display:flex; flex-direction:column; gap:6px; flex:0 0 auto; }
  .btn{ border:none; border-radius:9px; padding:9px 14px; font-size:13px; font-weight:600; color:#fff; white-space:nowrap; }
  .btn.up{ background:var(--gold); }
  .btn.down{ background:#9aa4b0; }
  .btn.note{ background:#fff; color:var(--navy); border:1px solid var(--navy); }
  .empty{ text-align:center; color:#999; padding:40px 20px; font-size:14px; }
  .more{ display:block; width:100%; padding:12px; border:1px dashed #bbc4cd; background:#fff; border-radius:10px; color:var(--navy); font-size:15px; margin-top:4px; }
  #loading{ text-align:center; padding:50px 20px; color:#777; }
  .toast{ position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:#333; color:#fff; padding:10px 18px; border-radius:20px; font-size:14px; z-index:99; opacity:0; transition:.3s; pointer-events:none; white-space:nowrap; }
  .toast.show{ opacity:.95; }
  .btn.bind{ background:#fff; color:#2E8B6B; border:1px solid #2E8B6B; }
  .tiny-del{ background:transparent; border:none; color:#cbd0d6; font-size:11px; padding:4px 2px; align-self:flex-end; cursor:pointer; }
  .tiny-del:active{ color:#c0392b; }
  .note.bind{ color:#2E8B6B; }
  .bindsheet{ position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:50; display:none; align-items:flex-end; }
  .bindsheet.show{ display:flex; }
  .bindsheet .panel{ background:#fff; width:100%; border-radius:16px 16px 0 0; padding:16px 16px 24px; max-height:85vh; overflow-y:auto; }
  .bindsheet h2{ font-size:16px; margin-bottom:6px; }
  .bindsheet .wsearch input{ width:100%; padding:11px 12px; border:1px solid #ccd3db; border-radius:9px; font-size:16px; margin:8px 0 10px; }
  .wlist .wrow{ border:1px solid #e3e8ee; border-radius:9px; padding:10px 12px; margin-bottom:8px; }
  .wlist .wrow .wn{ font-weight:600; font-size:14px; }
  .wlist .wrow .wm{ font-size:12px; color:#888; margin-top:3px; }
  .wlist .wrow button{ margin-top:8px; background:var(--navy); color:#fff; border:none; border-radius:8px; padding:8px 14px; font-size:13px; }
  .bindsheet .close{ width:100%; padding:12px; border:1px solid #ccd3db; background:#fff; border-radius:10px; margin-top:6px; font-size:15px; }
</style>
</head>
<body>
<header><h1>👥 瑀墨 — 客戶管理</h1></header>

<div id="loading">載入中…</div>

<div id="main" style="display:none">
  <div class="toolbar">
    <div class="search"><input id="q" placeholder="🔍 搜尋客戶名稱" /></div>
    <div class="tabs">
      <div class="tab on" id="tabVip" onclick="switchTab('approved')">🌟 熟客 <span id="cVip">0</span></div>
      <div class="tab" id="tabReg" onclick="switchTab('pending')">👤 非熟客 <span id="cReg">0</span></div>
    </div>
  </div>
  <div class="wrap">
    <div id="list"></div>
    <button class="more" id="moreBtn" style="display:none" onclick="loadMore()">載入更多 ⌄</button>
  </div>
</div>
<div class="toast" id="toast"></div>

<!-- 綁定 WMS 客戶 -->
<div class="bindsheet" id="bindSheet">
  <div class="panel">
    <h2>🔗 綁定 WMS 客戶</h2>
    <div style="font-size:12px;color:#888" id="bindFor"></div>
    <div style="font-size:12px;color:#999;margin-top:4px">綁定後，這位熟客線上備料的報價單會自動帶 WMS 客戶的統編／公司地址／電話。</div>
    <div class="wsearch"><input id="wq" placeholder="🔍 搜尋 WMS 客戶（名稱／統編／電話）" /></div>
    <div class="wlist" id="wlist"></div>
    <button class="close" onclick="closeBind()">關閉</button>
  </div>
</div>

<script>
var TOKEN = new URLSearchParams(location.search).get('t') || '';
var status = 'approved', search = '', offset = 0, items = [], hasMore = false, busy = false;
var _t;

function toast(m){ var t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); setTimeout(function(){ t.classList.remove('show'); },2000); }
function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function showError(m){ var l=document.getElementById('loading'); l.textContent=m; l.style.display='block'; document.getElementById('main').style.display='none'; }

async function api(path, opts){
  var sep = path.indexOf('?')>=0 ? '&' : '?';
  return fetch(path + sep + 't=' + encodeURIComponent(TOKEN), opts);
}

async function load(reset){
  if(busy) return; busy = true;
  if(reset){ offset = 0; items = []; }
  try{
    var r = await api('/staff/customers?status=' + status + '&search=' + encodeURIComponent(search) + '&offset=' + offset);
    if(r.status === 401 || r.status === 403){ var d=await r.json(); showError(d.detail || '連結已失效'); return; }
    if(!r.ok){ toast('載入失敗'); return; }
    var d = await r.json();
    document.getElementById('cVip').textContent = d.counts.approved;
    document.getElementById('cReg').textContent = d.counts.pending;
    items = items.concat(d.items);
    hasMore = d.has_more;
    offset += d.items.length;
    render();
    document.getElementById('loading').style.display = 'none';
    document.getElementById('main').style.display = 'block';
  }catch(e){ showError('載入失敗：' + (e.message||e)); }
  finally{ busy = false; }
}

function loadMore(){ load(false); }

function switchTab(s){
  if(status === s) return;
  status = s;
  document.getElementById('tabVip').classList.toggle('on', s==='approved');
  document.getElementById('tabReg').classList.toggle('on', s==='pending');
  load(true);
}

var _wt;
document.addEventListener('input', function(e){
  if(e.target.id === 'q'){ clearTimeout(_t); _t = setTimeout(function(){ search = e.target.value.trim(); load(true); }, 250); }
  if(e.target.id === 'wq'){ clearTimeout(_wt); _wt = setTimeout(function(){ searchWms(e.target.value.trim()); }, 250); }
});

function render(){
  var list = document.getElementById('list');
  if(!items.length){ list.innerHTML = '<div class="empty">沒有符合的客戶</div>'; document.getElementById('moreBtn').style.display='none'; return; }
  list.innerHTML = items.map(function(u){
    var isVip = u.role === 'approved';
    var tag = isVip ? '<span class="tag vip">🌟 熟客</span>' : '<span class="tag reg">👤 非熟客</span>';
    var note = u.note ? '<div class="note">📝 ' + esc(u.note) + '</div>' : '<div class="note nonote">📝 未標註真實身分</div>';
    var bindLine = isVip
      ? (u.wms_customer_name
          ? '<div class="note bind">🔗 已綁定：' + esc(u.wms_customer_name) + '</div>'
          : '<div class="note nonote">🔗 未綁定 WMS 客戶</div>')
      : '';
    var roleBtn = isVip
      ? '<button class="btn down" onclick="setRole(\'' + u.user_id + '\',\'demote\',this)">取消熟客</button>'
      : '<button class="btn up" onclick="setRole(\'' + u.user_id + '\',\'approve\',this)">設為熟客</button>';
    var noteBtn = '<button class="btn note" onclick="setNote(\'' + u.user_id + '\')">✏️ 備註</button>';
    var bindBtn = isVip ? '<button class="btn bind" onclick="openBind(\'' + u.user_id + '\')">🔗 綁定</button>' : '';
    var delBtn = '<button class="tiny-del" onclick="deleteCust(\'' + u.user_id + '\')">刪除</button>';
    return '<div class="item"><div class="info"><div class="nm">' + esc(u.name) + '</div>' + tag + note + bindLine +
      '</div><div class="btns">' + roleBtn + bindBtn + noteBtn + delBtn + '</div></div>';
  }).join('');
  document.getElementById('moreBtn').style.display = hasMore ? 'block' : 'none';
}

async function setRole(uid, action, el){
  el.disabled = true; el.textContent = '處理中…';
  try{
    var r = await api('/staff/customers/role', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ user_id: uid, action: action })
    });
    var d = await r.json();
    if(r.ok){
      toast(action === 'approve' ? '已設為熟客 🌟' : '已取消熟客');
      load(true);  // 重整目前分頁與計數
    }else{
      toast(d.detail || '操作失敗'); el.disabled = false;
      el.textContent = action === 'approve' ? '設為熟客' : '取消熟客';
    }
  }catch(e){ toast('操作失敗'); el.disabled = false; }
}

async function setNote(uid){
  var u = items.find(function(x){ return x.user_id === uid; });
  var v = prompt('備註（真實姓名／公司／電話，方便認人）：', (u && u.note) || '');
  if(v === null) return;  // 取消
  v = v.trim();
  try{
    var r = await api('/staff/customers/note', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ user_id: uid, note: v })
    });
    if(r.ok){ if(u) u.note = v; toast('備註已更新 📝'); render(); }
    else{ var d = await r.json(); toast(d.detail || '更新失敗'); }
  }catch(e){ toast('更新失敗'); }
}

// === 綁定 WMS 客戶 ===
var _bindUid = null;
function openBind(uid){
  _bindUid = uid;
  var u = items.find(function(x){ return x.user_id === uid; });
  document.getElementById('bindFor').textContent = '熟客：' + ((u&&u.name)||'') + (u&&u.wms_customer_name ? '（目前綁定：'+u.wms_customer_name+'）' : '（尚未綁定）');
  document.getElementById('wq').value = '';
  document.getElementById('wlist').innerHTML = '<div style="color:#999;font-size:13px;padding:8px 0">載入中…</div>';
  document.getElementById('bindSheet').classList.add('show');
  searchWms('');
}
function closeBind(){ document.getElementById('bindSheet').classList.remove('show'); }

async function searchWms(s){
  try{
    var r = await api('/staff/wms-customers?search=' + encodeURIComponent(s||''));
    if(!r.ok){ document.getElementById('wlist').innerHTML = '<div style="color:#c00;padding:8px 0">讀取失敗（檢查 WMS 連線）</div>'; return; }
    var d = await r.json();
    var u = items.find(function(x){ return x.user_id === _bindUid; });
    var cur = u ? String(u.wms_customer_id||'') : '';
    var html = (u && cur) ? '<div class="wrow"><div class="wn" style="color:#c0863a">解除目前綁定</div><button style="background:#c0863a" onclick="doBind(\'\',\'\')">解除綁定</button></div>' : '';
    html += (d.items||[]).map(function(c){
      var meta = [c.tax_id, c.phone, c.contact].filter(Boolean).join('　');
      var isCur = String(c.id) === cur;
      var nm = esc(c.name).replace(/'/g,"\\'");
      return '<div class="wrow"><div class="wn">' + esc(c.name) + (isCur?' ✅目前':'') + '</div>' +
        (meta?'<div class="wm">' + esc(meta) + '</div>':'') +
        '<button onclick="doBind(' + c.id + ',\'' + nm + '\')">綁定這筆</button></div>';
    }).join('') || '<div style="color:#999;padding:8px 0">找不到符合的 WMS 客戶</div>';
    document.getElementById('wlist').innerHTML = html;
  }catch(e){ document.getElementById('wlist').innerHTML = '<div style="color:#c00;padding:8px 0">讀取失敗</div>'; }
}

async function doBind(wmsId, wmsName){
  try{
    var r = await api('/staff/customers/bind', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ user_id:_bindUid, wms_customer_id: String(wmsId||'') }) });
    var d = await r.json();
    if(r.ok){
      var u = items.find(function(x){ return x.user_id === _bindUid; });
      if(u){ u.wms_customer_id = String(wmsId||''); u.wms_customer_name = wmsId ? wmsName : ''; }
      toast(wmsId ? ('已綁定：' + wmsName) : '已解除綁定');
      closeBind(); render();
    }else{ toast(d.detail || '綁定失敗'); }
  }catch(e){ toast('綁定失敗'); }
}

async function deleteCust(uid){
  var u = items.find(function(x){ return x.user_id === uid; });
  var nm = (u && u.name) || '此客戶';
  if(!confirm('確定刪除「' + nm + '」？此動作無法復原。')) return;
  try{
    var r = await api('/staff/customers/delete', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ user_id: uid }) });
    var d = await r.json();
    if(r.ok){ items = items.filter(function(x){ return x.user_id !== uid; }); toast('已刪除'); load(true); }
    else { toast(d.detail || '刪除失敗'); }
  }catch(e){ toast('刪除失敗'); }
}

if(!TOKEN){ showError('連結無效，請回 LINE 打「客戶名單」取得連結'); }
else{ load(true); }
</script>
</body>
</html>
