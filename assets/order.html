<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>瑀墨塗料 — 線上叫貨</title>
<style>
  :root{ --ink:#1b1b1f; --navy:#2B5C8A; --gold:#C8A45C; --gold-d:#a8863f; }
  *{ box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
  body{ font-family:"Microsoft JhengHei","PingFang TC","Apple Color Emoji","Segoe UI Emoji","Noto Color Emoji",sans-serif; background:#f4f6f9; color:#222; padding-bottom:calc(100px + env(safe-area-inset-bottom)); }
  /* 標題列＋工具列合併吸頂，不再猜高度 */
  .topbar{ position:sticky; top:0; z-index:20; background:#f4f6f9; }
  header{ background:var(--ink); color:var(--gold); padding:14px 16px; border-bottom:2px solid var(--gold); }
  header h1{ font-size:17px; }
  header .sub{ font-size:12px; opacity:.85; margin-top:2px; }

  /* 搜尋 + 品牌快篩 */
  .toolbar{ background:#f4f6f9; padding:10px 16px 8px; box-shadow:0 4px 6px -4px rgba(0,0,0,.12); }
  .search input{ width:100%; padding:12px 14px; border:1px solid #ccd3db; border-radius:10px; font-size:16px; }
  .chips{ display:flex; gap:8px; overflow-x:auto; padding:10px 0 2px; -webkit-overflow-scrolling:touch; }
  .chips::-webkit-scrollbar{ display:none; }
  .chip{ flex:0 0 auto; padding:7px 14px; border:1px solid #ccd3db; border-radius:18px; background:#fff; font-size:14px; color:#555; white-space:nowrap; }
  .chip.on{ background:var(--ink); color:var(--gold); border-color:var(--ink); }

  .wrap{ padding:6px 16px 16px; }
  .last-box{ background:#fff8e8; border:1px solid var(--gold); border-radius:10px; padding:12px 14px; margin:6px 0 12px; font-size:13px; line-height:1.7; }
  .last-box .t{ font-weight:700; color:#8a6d2b; margin-bottom:4px; }
  .last-box button{ margin-top:10px; background:var(--gold); color:var(--ink); border:none; padding:9px 16px; border-radius:8px; font-size:14px; font-weight:600; }
  .count{ font-size:13px; color:#888; margin:4px 2px 10px; }

  /* 商品卡 */
  .item{ background:#fff; border:1px solid #e3e8ee; border-radius:10px; padding:12px 14px; margin-bottom:10px; display:flex; justify-content:space-between; align-items:flex-start; gap:10px; }
  .item.picked{ border-color:var(--gold); box-shadow:0 0 0 1px var(--gold) inset; }
  .item .info{ flex:1; min-width:0; }
  .item .brand{ display:inline-block; font-size:11px; color:#8a6d2b; background:#f6efda; border-radius:4px; padding:1px 7px; margin-bottom:5px; }
  .item .nm{ font-size:15px; font-weight:600; line-height:1.45; word-break:break-word; }
  .item .meta{ font-size:12px; color:#888; margin-top:5px; }
  .item .meta b{ color:#555; font-weight:600; }

  /* 數量控制 */
  .qty{ display:flex; flex-direction:column; align-items:center; gap:6px; flex:0 0 auto; }
  .qrow{ display:flex; align-items:center; gap:10px; }
  .qty button{ width:38px; height:38px; border:none; border-radius:9px; background:var(--ink); color:#fff; font-size:22px; line-height:1; font-weight:600; }
  .qty button:active{ opacity:.7; }
  .qty .num{ min-width:30px; text-align:center; font-size:18px; font-weight:700; }
  .qty .unit{ font-size:11px; color:#999; }

  .cart-bar{ position:fixed; bottom:0; left:0; right:0; background:#fff; border-top:1px solid #ddd; padding:12px 16px calc(12px + env(safe-area-inset-bottom)); display:flex; justify-content:space-between; align-items:center; box-shadow:0 -2px 10px rgba(0,0,0,.06); }
  .cart-bar .n{ font-size:14px; line-height:1.4; }
  .cart-bar .n b{ color:var(--gold-d); font-size:16px; }
  .cart-bar button{ background:var(--gold); color:var(--ink); border:none; padding:13px 26px; border-radius:10px; font-size:16px; font-weight:700; }
  .cart-bar button:disabled{ background:#d8d2c4; color:#8a8472; }
  .empty{ text-align:center; color:#999; padding:40px 20px; font-size:14px; }
  #loading{ text-align:center; padding:60px 20px; color:#777; }
  .toast{ position:fixed; top:70px; left:50%; transform:translateX(-50%); background:#333; color:#fff; padding:10px 18px; border-radius:20px; font-size:14px; z-index:99; opacity:0; transition:.3s; pointer-events:none; white-space:nowrap; }
  .toast.show{ opacity:.95; }

  /* 結帳前：案場 / 取貨資訊 */
  .sheet{ position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:60; display:none; align-items:flex-end; }
  .sheet.show{ display:flex; }
  .sheet .panel{ background:#fff; width:100%; border-radius:16px 16px 0 0; padding:18px 16px calc(18px + env(safe-area-inset-bottom)); max-height:88vh; overflow-y:auto; }
  .sheet h2{ font-size:16px; color:var(--ink); margin-bottom:4px; }
  .sheet .hint{ font-size:12px; color:#999; margin-bottom:14px; }
  .field{ margin-bottom:14px; }
  .field label{ display:block; font-size:13px; color:#555; font-weight:600; margin-bottom:6px; }
  .field input{ width:100%; padding:11px 12px; border:1px solid #ccd3db; border-radius:9px; font-size:16px; }
  .seg{ display:flex; gap:10px; }
  .seg label{ flex:1; border:1px solid #ccd3db; border-radius:9px; padding:11px; text-align:center; font-size:15px; color:#555; font-weight:600; cursor:pointer; }
  .seg label.on{ background:var(--ink); color:var(--gold); border-color:var(--ink); }
  .sheet .actions{ display:flex; gap:10px; margin-top:6px; }
  .sheet .actions button{ flex:1; padding:13px; border:none; border-radius:10px; font-size:16px; font-weight:700; }
  .sheet .cancel{ background:#eceff3; color:#555; }
  .sheet .ok{ background:var(--gold); color:var(--ink); }
  .sheet .ok:disabled{ background:#d8d2c4; color:#8a8472; }
</style>
</head>
<body>
<div class="topbar">
  <header>
    <h1><img src="/assets/logo_gold.png" alt="" style="height:22px;width:22px;vertical-align:-4px;margin-right:7px">瑀墨塗料 — 線上叫貨</h1>
    <div class="sub" id="who">驗證中…</div>
  </header>
  <div class="toolbar" id="toolbar" style="display:none">
    <div class="search"><input id="q" placeholder="🔍 搜尋品名 / 品牌（例：乳膠漆、虹牌）" /></div>
    <div class="chips" id="chips"></div>
  </div>
</div>

<div id="loading">載入中…</div>

<div id="main" style="display:none">
  <div class="wrap">
    <div id="lastBox"></div>
    <div class="count" id="count"></div>
    <div id="list"></div>
  </div>
</div>

<div class="cart-bar" id="cartBar" style="display:none">
  <div class="n" id="cartN">尚未選購</div>
  <button id="submitBtn" disabled onclick="submitOrder()">送出叫貨</button>
</div>
<div class="toast" id="toast"></div>

<!-- 結帳前：案場 / 取貨資訊 -->
<div class="sheet" id="checkout">
  <div class="panel">
    <h2>📋 最後一步：案場與取貨</h2>
    <div class="hint">填好送出後會收到下單回條，專員確認後出貨。</div>
    <div class="field">
      <label>取貨方式</label>
      <div class="seg" id="segDeliver">
        <label class="on" data-v="送到案場" onclick="pickDeliver(this)">🚚 送到案場</label>
        <label data-v="自取" onclick="pickDeliver(this)">🏪 自取</label>
      </div>
    </div>
    <div class="field" id="siteField">
      <label>案場地址 / 工地 <span style="color:#c0392b">*</span></label>
      <input id="ckSite" placeholder="例：宜蘭市○○路123號 工地" />
    </div>
    <div class="field">
      <label>現場負責人 <span style="color:#c0392b">*</span></label>
      <input id="ckSales" placeholder="負責人姓名" />
    </div>
    <div class="field">
      <label>聯絡電話 <span style="color:#c0392b">*</span></label>
      <input id="ckPhone" type="tel" inputmode="tel" placeholder="例：0912-345-678" />
    </div>
    <div class="field">
      <label>備註（可留空）</label>
      <input id="ckNote" placeholder="出貨時間、其他需求…" />
    </div>
    <div class="actions">
      <button class="cancel" onclick="closeCheckout()">返回</button>
      <button class="ok" id="ckOk" onclick="confirmSubmit()">確認送出</button>
    </div>
  </div>
</div>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<script>
var idToken = "", cart = {}, allCatalog = [], catalog = [], lastItems = [];
var curBrand = "", curSearch = "";

function toast(m){ var t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); setTimeout(function(){ t.classList.remove('show'); },2000); }
function H(){ return {'X-Line-IdToken': idToken}; }
function showError(msg){ var l=document.getElementById('loading'); l.textContent=msg; l.style.display='block'; document.getElementById('main').style.display='none'; document.getElementById('toolbar').style.display='none'; document.getElementById('cartBar').style.display='none'; }
function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

async function init(){
  try{
    var cfg = await (await fetch('/liff/config')).json();
    if(!cfg.liff_id){ showError('系統尚未設定，請通知管理員'); return; }
    await liff.init({ liffId: cfg.liff_id });
    if(!liff.isLoggedIn()){ liff.login(); return; }
    idToken = liff.getIDToken();
    var prof = await liff.getProfile();
    document.getElementById('who').textContent = '熟客：' + prof.displayName;
    var ok = await loadCatalog();
    if(!ok) return;
    await loadHistory();
    document.getElementById('loading').style.display = 'none';
    document.getElementById('toolbar').style.display = 'block';
    document.getElementById('main').style.display = 'block';
    document.getElementById('cartBar').style.display = 'flex';
  }catch(e){
    showError('載入失敗：' + (e.message || e));
  }
}

async function loadCatalog(){
  var r = await fetch('/liff/catalog', { headers: H() });
  if(r.status === 403){ showError('此功能限熟客使用，請洽專員開通'); return false; }
  if(!r.ok){ showError('載入品項失敗，請稍後再試或通知專員'); return false; }
  allCatalog = await r.json();
  buildChips();
  applyFilter();
  return true;
}

function buildChips(){
  var seen = {}, brands = [];
  allCatalog.forEach(function(p){ var b=(p.brand||'其他').trim()||'其他'; if(!seen[b]){ seen[b]=1; brands.push(b); } });
  var box = document.getElementById('chips');
  var html = '<div class="chip on" data-b="" onclick="pickBrand(this,\'\')">全部</div>';
  html += brands.map(function(b){ return '<div class="chip" data-b="'+esc(b)+'" onclick="pickBrand(this,\''+esc(b).replace(/'/g,"\\'")+'\')">'+esc(b)+'</div>'; }).join('');
  box.innerHTML = html;
}

function pickBrand(el, b){
  curBrand = b;
  var chips = document.querySelectorAll('.chip');
  for(var i=0;i<chips.length;i++) chips[i].classList.remove('on');
  el.classList.add('on');
  applyFilter();
}

var _t;
document.addEventListener('input', function(e){
  if(e.target.id === 'q'){ clearTimeout(_t); _t = setTimeout(function(){ curSearch = e.target.value.trim(); applyFilter(); }, 200); }
});

function applyFilter(){
  var s = curSearch.toLowerCase();
  catalog = allCatalog.filter(function(p){
    if(curBrand && (p.brand||'其他').trim() !== curBrand) return false;
    if(!s) return true;
    return ((p.brand||'')+' '+(p.name||'')+' '+(p.color_name||'')).toLowerCase().indexOf(s) >= 0;
  });
  render();
}

async function loadHistory(){
  try{
    var r = await fetch('/liff/history', { headers: H() });
    if(!r.ok) return;
    var d = await r.json();
    if(d.items && d.items.length){
      lastItems = d.items;
      var box = document.getElementById('lastBox');
      box.className = 'last-box';
      box.innerHTML = '<div class="t">📋 上次您訂的'+(d.date?'（'+esc(d.date)+'）':'')+'</div>' +
        d.items.map(function(it){ return '· ' + esc(it.product_name) + ' ×' + it.quantity + esc(it.unit||''); }).join('<br>') +
        '<br><button onclick="fillLast()">一鍵帶入上次品項</button>';
    }
  }catch(e){}
}

function fillLast(){
  lastItems.forEach(function(it){
    if(it.product_id) cart[it.product_id] = { product_id: it.product_id, product_name: it.product_name, unit: it.unit, quantity: it.quantity };
  });
  render(); updateCart(); toast('已帶入上次品項');
}

function render(){
  var list = document.getElementById('list');
  document.getElementById('count').textContent = '共 ' + catalog.length + ' 項' + (curBrand ? '（'+curBrand+'）' : '');
  if(!catalog.length){ list.innerHTML = '<div class="empty">找不到品項<br>試試其他關鍵字或品牌</div>'; return; }
  list.innerHTML = catalog.map(function(p){
    var q = cart[p.id] ? cart[p.id].quantity : 0;
    var brand = esc(p.brand || '');
    var nm = esc(p.name) + (p.color_name ? '（' + esc(p.color_name) + '）' : '');
    var metaParts = [];
    if(p.spec) metaParts.push(esc(p.spec));
    metaParts.push('單位：<b>' + esc(p.unit || '個') + '</b>');
    return '<div class="item' + (q>0?' picked':'') + '" id="it' + p.id + '">' +
      '<div class="info">' +
        (brand ? '<span class="brand">' + brand + '</span>' : '') +
        '<div class="nm">' + nm + '</div>' +
        '<div class="meta">' + metaParts.join('　') + '</div>' +
      '</div>' +
      '<div class="qty"><div class="qrow">' +
        '<button onclick="chg(' + p.id + ',-1)">−</button>' +
        '<span class="num" id="q' + p.id + '">' + q + '</span>' +
        '<button onclick="chg(' + p.id + ',1)">＋</button>' +
      '</div><span class="unit">' + esc(p.unit || '') + '</span></div>' +
    '</div>';
  }).join('');
}

function chg(id, d){
  var p = allCatalog.find(function(x){ return x.id === id; });
  if(!p) return;
  var cur = cart[id] ? cart[id].quantity : 0;
  cur = Math.max(0, cur + d);
  if(cur === 0){ delete cart[id]; }
  else{ cart[id] = { product_id: id, product_name: (p.brand ? p.brand + ' ' : '') + p.name + (p.color_name ? '（' + p.color_name + '）' : ''), unit: p.unit, quantity: cur }; }
  var el = document.getElementById('q' + id); if(el) el.textContent = cur;
  var card = document.getElementById('it' + id); if(card){ if(cur>0) card.classList.add('picked'); else card.classList.remove('picked'); }
  updateCart();
}

function updateCart(){
  var ids = Object.keys(cart);
  var tot = ids.reduce(function(s,k){ return s + cart[k].quantity; }, 0);
  document.getElementById('cartN').innerHTML = ids.length ? ('已選 <b>' + ids.length + '</b> 項 / 共 <b>' + tot + '</b> 件') : '尚未選購';
  document.getElementById('submitBtn').disabled = !ids.length;
}

var deliverMethod = "送到案場";

// 點「送出叫貨」→ 先填案場/取貨資訊
function submitOrder(){
  var items = Object.keys(cart).map(function(k){ return cart[k]; });
  if(!items.length) return;
  document.getElementById('checkout').classList.add('show');
}
function closeCheckout(){ document.getElementById('checkout').classList.remove('show'); }
function pickDeliver(el){
  var segs = el.parentNode.querySelectorAll('label');
  for(var i=0;i<segs.length;i++) segs[i].classList.remove('on');
  el.classList.add('on');
  deliverMethod = el.getAttribute('data-v');
  // 自取免填案場地址
  document.getElementById('siteField').style.display = (deliverMethod === '自取') ? 'none' : '';
}

async function confirmSubmit(){
  var items = Object.keys(cart).map(function(k){ return cart[k]; });
  if(!items.length){ closeCheckout(); return; }
  var site  = document.getElementById('ckSite').value.trim();
  var sales = document.getElementById('ckSales').value.trim();
  var phone = document.getElementById('ckPhone').value.trim();
  if(deliverMethod === '送到案場' && !site){ toast('請填案場地址'); return; }
  if(!sales){ toast('請填現場負責人'); return; }
  if(!phone){ toast('請填聯絡電話'); return; }
  var note  = document.getElementById('ckNote').value.trim();
  document.getElementById('ckOk').disabled = true;
  document.getElementById('submitBtn').disabled = true;
  try{
    var r = await fetch('/liff/order', {
      method: 'POST',
      headers: Object.assign({ 'Content-Type': 'application/json' }, H()),
      body: JSON.stringify({
        items: items,
        delivery_method: (deliverMethod === '自取') ? '自取' : '公司代送',
        site_address: site,
        sales_person: sales,
        phone: phone,
        note: note
      })
    });
    var d = await r.json();
    if(r.ok){
      closeCheckout();
      alert('✅ 叫貨單已送出！\n單號：' + d.order_number + '\n已傳下單回條到您的聊天室，專員確認後會與您聯繫。');
      cart = {}; render(); updateCart();
      if(liff.isInClient()) liff.closeWindow();
    }else{
      alert('送出失敗：' + (d.detail || '請稍後再試'));
      document.getElementById('ckOk').disabled = false;
      document.getElementById('submitBtn').disabled = false;
    }
  }catch(e){
    alert('送出失敗：' + (e.message || e));
    document.getElementById('ckOk').disabled = false;
    document.getElementById('submitBtn').disabled = false;
  }
}

init();
</script>
</body>
</html>
